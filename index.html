<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Enfriamiento y Sorteos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e2d9f3;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .contenedor {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h2, h3 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
        }
        h3 {
            margin-top: 40px;
            border-top: 1px solid #eee;
            padding-top: 25px;
            font-size: 1.17em;
        }
        .campo {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .resultado {
            margin-top: 20px;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
            color: #28a745;
            min-height: 24px;
        }
    </style>
</head>
<body>

<div class="contenedor">
    
    <h2>Enfriamiento</h2>
    
    <div class="campo">
        <label>Temperatura inicial del objeto (T0):</label>
        <input type="number" id="t0">
    </div>
    
    <div class="campo">
        <label>Temperatura constante de la cámara (Ts):</label>
        <input type="number" id="ts">
    </div>
    
    <div class="campo">
        <label>Tiempo transcurrido (t):</label>
        <input type="number" id="t">
    </div>
    
    <button onclick="calcularTemperatura()">Calcular Temperatura Final</button>
    
    <h3>Combinaciones complejas en el caso de sorteos</h3>
    
    <div class="campo">
        <label>Total de números principales (n1):</label>
        <input type="number" id="n1">
    </div>
    
    <div class="campo">
        <label>Números a elegir del primer grupo (r1):</label>
        <input type="number" id="r1">
    </div>
    
    <div class="campo">
        <label>Total de números del segundo grupo (n2):</label>
        <input type="number" id="n2">
    </div>
    
    <div class="campo">
        <label>Números a elegir del segundo grupo (r2):</label>
        <input type="number" id="r2">
    </div>
    
    <button onclick="calcularPowerball()">Calcular Combinaciones</button>
    
    <div class="resultado" id="resultadoFinal"></div>
</div>

<script>
    function calcularTemperatura() {
        let t0 = parseFloat(document.getElementById('t0').value);
        let ts = parseFloat(document.getElementById('ts').value);
        let t = parseFloat(document.getElementById('t').value);
        let k = 0.45;
        
        if (isNaN(t0) || isNaN(ts) || isNaN(t)) {
            document.getElementById('resultadoFinal').innerText = "Por favor, llene todos los campos.";
            document.getElementById('resultadoFinal').style.color = "red";
            return;
        }
        
        let T = ts + (t0 - ts) * Math.exp(-k * t);
        document.getElementById('resultadoFinal').style.color = "#28a745";
        document.getElementById('resultadoFinal').innerText = "Temperatura Final: " + T.toFixed(2) + " °F";
    }

    function factorial(n) {
        let f = 1;
        for (let i = 1; i <= n; i++) {
            f *= i;
        }
        return f;
    }

    function combinacion(n, r) {
        if (r > n || n < 0 || r < 0) return 0;
        return factorial(n) / (factorial(r) * factorial(n - r));
    }

    function calcularPowerball() {
        let n1 = parseInt(document.getElementById('n1').value);
        let r1 = parseInt(document.getElementById('r1').value);
        let n2 = parseInt(document.getElementById('n2').value);
        let r2 = parseInt(document.getElementById('r2').value);
        
        if (isNaN(n1) || isNaN(r1) || isNaN(n2) || isNaN(r2)) {
            document.getElementById('resultadoFinal').innerText = "Por favor, llene todos los campos del sorteo.";
            document.getElementById('resultadoFinal').style.color = "red";
            return;
        }
        
        let grupo1 = combinacion(n1, r1);
        let grupo2 = combinacion(n2, r2);
        let total = grupo1 * grupo2;
        
        document.getElementById('resultadoFinal').style.color = "#28a745";
        document.getElementById('resultadoFinal').innerText = "Combinaciones posibles: " + total.toLocaleString();
    }
</script>

</body>
</html>
